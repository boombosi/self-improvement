<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelfBank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="toast" class="toast hidden"></div>

    <!-- Auth overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h1 class="auth-title">🏦 SelfBank</h1>
            <p class="auth-subtitle" id="auth-subtitle">登录你的账户</p>

            <form id="auth-form" autocomplete="off">
                <div class="form-group">
                    <label for="auth-email">邮箱</label>
                    <input type="email" id="auth-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="auth-password">密码</label>
                    <input type="password" id="auth-password" placeholder="至少6位" required>
                </div>
                <div class="form-group hidden" id="auth-password2-group">
                    <label for="auth-password2">确认密码</label>
                    <input type="password" id="auth-password2" placeholder="再次输入密码">
                </div>
                <div id="auth-error" class="auth-error hidden"></div>
                <button type="submit" class="btn btn-primary btn-block" id="auth-submit-btn">登录</button>
            </form>

            <p class="auth-switch">
                <span id="auth-switch-text">还没有账号？</span>
                <a href="#" id="auth-switch-link">立即注册</a>
            </p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard hidden">
        <header class="header">
            <h1 class="logo">🏦 SelfBank</h1>
            <div class="header-right">
                <span class="user-email" id="user-email"></span>
                <div class="settings-dropdown">
                    <button class="btn btn-icon" id="settings-btn" title="设置">⚙️</button>
                    <div class="dropdown-menu hidden" id="settings-menu">
                        <button onclick="exportData()">📥 导出数据</button>
                        <button onclick="document.getElementById('import-file').click()">📤 导入数据</button>
                        <input type="file" id="import-file" accept=".json" hidden onchange="importData(event)">
                        <button class="danger" onclick="clearAllData()">🗑️ 清空数据</button>
                    </div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="logout()">退出登录</button>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="study">📊 学习时间</button>
            <button class="tab" data-tab="finance">💰 资金账户</button>
            <button class="tab" data-tab="skills">🧠 技能账户</button>
            <button class="tab" data-tab="products">🚀 产品账户</button>
        </nav>

        <!-- Study Tab -->
        <section id="tab-study" class="tab-content active">
            <div class="stats-row" id="study-stats">
                <div class="stat-card">
                    <div class="stat-label">今日学习</div>
                    <div class="stat-value" id="stat-today">0小时0分钟</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">本月学习</div>
                    <div class="stat-value" id="stat-month">0小时0分钟</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总学习时长</div>
                    <div class="stat-value" id="stat-total">0小时0分钟</div>
                </div>
            </div>

            <div class="study-controls">
                <button class="btn btn-primary" id="btn-start" onclick="startStudy()">▶ 开始学习</button>
                <button class="btn btn-secondary" id="btn-end" onclick="endStudy()" disabled>⏹ 结束学习</button>
            </div>

            <div class="section">
                <h2 class="section-title">📋 最近学习记录</h2>
                <div class="list" id="study-list"></div>
            </div>
        </section>

        <!-- Finance Tab -->
        <section id="tab-finance" class="tab-content">
            <div class="stats-row" id="finance-summary">
                <div class="stat-card income">
                    <div class="stat-label">当前余额</div>
                    <div class="stat-value" id="fin-balance">¥0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">本月收入</div>
                    <div class="stat-value" id="fin-income">¥0.00</div>
                </div>
                <div class="stat-card expense">
                    <div class="stat-label">本月支出</div>
                    <div class="stat-value" id="fin-expense">¥0.00</div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">➕ 添加记录</h2>
                <form id="finance-form" class="inline-form" onsubmit="return addFinance(event)">
                    <input type="date" id="fin-date" required>
                    <select id="fin-type" required>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                    <input type="number" id="fin-amount" placeholder="金额" step="0.01" min="0.01" required>
                    <input type="text" id="fin-category" placeholder="分类">
                    <input type="text" id="fin-note" placeholder="备注">
                    <button type="submit" class="btn btn-primary">添加</button>
                </form>
            </div>

            <div class="section">
                <h2 class="section-title">📋 资金记录</h2>
                <div class="list" id="finance-list"></div>
            </div>
        </section>

        <!-- Skills Tab -->
        <section id="tab-skills" class="tab-content">
            <div class="section">
                <h2 class="section-title" id="skill-form-title">➕ 添加技能</h2>
                <form id="skill-form" class="inline-form" onsubmit="return saveSkill(event)">
                    <input type="hidden" id="skill-edit-id">
                    <input type="text" id="skill-name" placeholder="技能名称" required>
                    <input type="number" id="skill-hours" placeholder="学习时长(小时)" step="0.1" min="0.1" required>
                    <select id="skill-proficiency">
                        <option value="了解">了解</option>
                        <option value="熟悉">熟悉</option>
                        <option value="掌握">掌握</option>
                        <option value="精通">精通</option>
                    </select>
                    <input type="url" id="skill-link" placeholder="相关链接">
                    <input type="text" id="skill-note" placeholder="备注">
                    <button type="submit" class="btn btn-primary" id="skill-submit-btn">添加</button>
                    <button type="button" class="btn btn-outline hidden" id="skill-cancel-btn" onclick="cancelSkillEdit()">取消</button>
                </form>
            </div>

            <div class="section">
                <h2 class="section-title">🧠 技能列表</h2>
                <div class="list" id="skill-list"></div>
            </div>
        </section>

        <!-- Products Tab -->
        <section id="tab-products" class="tab-content">
            <div class="section">
                <h2 class="section-title" id="product-form-title">➕ 添加产品</h2>
                <form id="product-form" class="inline-form" onsubmit="return saveProduct(event)">
                    <input type="hidden" id="product-edit-id">
                    <input type="text" id="product-name" placeholder="项目名称" required>
                    <select id="product-type">
                        <option value="文章">文章</option>
                        <option value="工具">工具</option>
                        <option value="课程">课程</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="date" id="product-date">
                    <input type="url" id="product-link" placeholder="链接">
                    <input type="text" id="product-desc" placeholder="描述">
                    <button type="submit" class="btn btn-primary" id="product-submit-btn">添加</button>
                    <button type="button" class="btn btn-outline hidden" id="product-cancel-btn" onclick="cancelProductEdit()">取消</button>
                </form>
            </div>

            <div class="section">
                <h2 class="section-title">🚀 产品列表</h2>
                <div class="list" id="product-list"></div>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
